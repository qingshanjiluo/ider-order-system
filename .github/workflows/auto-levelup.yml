name: ⬆️ 一键升级

on:
  schedule:
    - cron: '0 */1 * * *'  # 每1小时自动执行
  workflow_dispatch:
    inputs:
      max_accounts:
        description: '账号数量（留空=全部）'
        required: false
        default: ''
        type: string
      range:
        description: '范围如 1-10（留空=全部）'
        required: false
        default: ''
        type: string

jobs:
  pre-check:
    name: 预检查 - API 可用性
    runs-on: ubuntu-latest
    outputs:
      api_ok: ${{ steps.check.outputs.api_ok }}
      worker_ok: ${{ steps.check.outputs.worker_ok }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检查 Worker API 可用性
        id: check
        run: |
          WORKER_URL="https://ider-order-system.sifangzhiji.workers.dev"
          API_KEY="ider-gh-5fc9c4b0899ad14bc2ee55562eaa5b3a"
          
          echo "🔍 检查 Worker API..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "X-API-Key: $API_KEY" "$WORKER_URL/api/gh/active-accounts")
          echo "Worker API 状态码: $STATUS"
          
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
            echo "worker_ok=true" >> $GITHUB_OUTPUT
            echo "✅ Worker API 可用"
          else
            echo "worker_ok=false" >> $GITHUB_OUTPUT
            echo "❌ Worker API 不可用"
          fi
          
          # 检查游戏 API
          GAME_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://idlexiuxianzhuan.cn/auth/login" -H "Content-Type: application/json" -d '{"username":"test","password":"test"}')
          echo "游戏 API 状态码: $GAME_STATUS"
          
          if [ "$GAME_STATUS" -lt 500 ]; then
            echo "api_ok=true" >> $GITHUB_OUTPUT
            echo "✅ 游戏 API 可用"
          else
            echo "api_ok=false" >> $GITHUB_OUTPUT
            echo "❌ 游戏 API 不可用"
          fi

  levelup:
    name: 自动升级
    needs: pre-check
    if: needs.pre-check.outputs.worker_ok == 'true' && needs.pre-check.outputs.api_ok == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '批量注册工具/package-lock.json'

      - name: 安装依赖
        run: |
          cd 批量注册工具
          npm install

      - name: 获取活跃账号列表
        env:
          WORKER_URL: 'https://ider-order-system.sifangzhiji.workers.dev'
          API_KEY: 'ider-gh-5fc9c4b0899ad14bc2ee55562eaa5b3a'
        run: |
          cd 批量注册工具
          echo "🔄 从数据库获取活跃账号..."
          node ../工单系统/gh-actions/fetch_active_accounts.js
          echo "📊 账号文件内容:"
          if [ -f alchemy_accounts.txt ]; then
            wc -l alchemy_accounts.txt
            head -5 alchemy_accounts.txt
          else
            echo "⚠️ 未生成账号文件"
          fi

      - name: 检查账号文件
        run: |
          cd 批量注册工具
          if [ ! -f alchemy_accounts.txt ] || [ ! -s alchemy_accounts.txt ]; then
            echo "⚠️ 没有需要升级的账号，跳过执行"
            exit 0
          fi

      - name: 运行一键升级
        env:
          CI: "true"
          MAX_ACCOUNTS: ${{ github.event.inputs.max_accounts || '' }}
          RANGE: ${{ github.event.inputs.range || '' }}
        run: |
          cd 批量注册工具
          echo "⬆️ 开始一键升级..."
          node levelup.js

      - name: 上传结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: levelup-result-${{ github.run_number }}
          path: 批量注册工具/levelup_result_*.json
          retention-days: 7

      - name: 结果摘要
        if: always()
        run: |
          cd 批量注册工具
          echo "═══════════════════════════════════════"
          echo "  📊 升级执行结果"
          echo "═══════════════════════════════════════"
          if [ -f levelup_result_*.json ]; then
            echo "结果文件:"
            ls -la levelup_result_*.json
            echo ""
            echo "摘要:"
            cat levelup_result_*.json | head -200
          else
            echo "⚠️ 无结果文件"
          fi
          echo "═══════════════════════════════════════"

  skip-notify:
    name: 跳过通知
    needs: pre-check
    if: needs.pre-check.outputs.worker_ok != 'true' || needs.pre-check.outputs.api_ok != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 通知 API 不可用
        run: |
          echo "⚠️ API 不可用，跳过本次升级"
          echo "Worker API: ${{ needs.pre-check.outputs.worker_ok }}"
          echo "游戏 API: ${{ needs.pre-check.outputs.api_ok }}"
