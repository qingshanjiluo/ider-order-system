# ════════════════════════════════════════════════════════════
#  艾德尔修仙传 - 账号完整性检查修复工具 🔍
# ════════════════════════════════════════════════════════════
#  📂 文件指向说明
#  ════════════════════════════════════════════════════════════
#  本工作流使用「accounts.txt」作为账号文件
#  检查每个账号的：
#    ① 初始三技能（重击/火球术/治疗术）是否已装备
#    ② 铁剑是否已装备到武器栏
#  自动补装不完整的项目
#  ════════════════════════════════════════════════════════════
#  使用方式：
#    手动触发 workflow_dispatch 即可
#    如账号在 GitHub Secrets 中，无需额外操作
#  ════════════════════════════════════════════════════════════

name: 🔍 账号完整性检查

on:
  workflow_dispatch:
    inputs:
      accounts:
        description: '账号列表（每行: username,password），留空则使用仓库中的 accounts.txt'
        required: false
        default: ''
      check_only:
        description: '仅检查不修复 [true/false]'
        required: false
        default: 'false'
      batch_index:
        description: '批次序号'
        required: false
        default: '1'

jobs:
  check-accounts:
    name: 🔍 检查并修复
    runs-on: ubuntu-latest

    permissions:
      contents: write

    defaults:
      run:
        working-directory: 批量注册工具

    steps:
      - name: 🔄 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 批量注册工具/package-lock.json

      - name: 📦 安装依赖
        run: npm install
        env:
          NODE_ENV: production

      - name: 📝 准备账号文件
        run: |
          echo "═══════════════════════════════════════════════"
          echo "  准备账号文件 accounts.txt"
          echo "═══════════════════════════════════════════════"

          if [ -n "${{ github.event.inputs.accounts }}" ]; then
            echo "📄 使用 workflow 传入的账号数据"
            echo "${{ github.event.inputs.accounts }}" > accounts.txt
          fi

          if [ -n "${{ secrets.ACCOUNTS_DATA }}" ]; then
            echo "🔐 使用 GitHub Secrets 中的账号数据"
            echo "${{ secrets.ACCOUNTS_DATA }}" > accounts.txt
          fi

          if [ -n "${{ secrets.ACCOUNTS_BASE64 }}" ]; then
            echo "🔐 使用 base64 编码账号数据"
            echo "${{ secrets.ACCOUNTS_BASE64 }}" | base64 -d > accounts.txt
          fi

          if [ ! -f accounts.txt ]; then
            echo "❌ 未找到 accounts.txt！请通过 Secrets 或 workflow_dispatch 传入"
            exit 1
          fi

          echo "✅ 账号文件就绪，共 $(wc -l < accounts.txt) 行（含注释）"

      - name: 🚀 执行检查修复
        run: |
          echo "⏱️ 开始时间: $(date '+%Y-%m-%d %H:%M:%S')"

          if [ "${{ github.event.inputs.check_only || 'false' }}" = "true" ]; then
            CI=true node batch_check.js --check-only
          else
            CI=true node batch_check.js
          fi

        env:
          CI: true
          NODE_ENV: production

      - name: 📤 上传检查结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-result-${{ github.event.inputs.batch_index || '1' }}-${{ github.run_id }}
          path: |
            批量注册工具/check_result_*.json
          compression-level: 6
          retention-days: 7

      - name: 📊 输出结果摘要
        if: always()
        run: |
          echo "═══════════════════════════════════════════════"
          echo "  ⏱️  结束时间: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "═══════════════════════════════════════════════"

          RESULT_FILE=$(ls -t check_result_*.json 2>/dev/null | head -1)
          if [ -z "$RESULT_FILE" ]; then
            echo "  未找到结果文件"
            exit 0
          fi

          node -e "
            const d=require('./$RESULT_FILE');
            console.log('  账号文件: '+d.filepath);
            console.log('  总账号数: '+d.totalAccounts);
            console.log('  模式: '+(d.mode||'?'));
            console.log('');
            (d.accounts||[]).forEach(a=>{
              const s=a.stats||{};
              const errs=(s.errors||[]).length;
              const fixed=(s.fixedSkills||0)+(s.fixedIronSword?1:0);
              if (errs>0) console.log('  ❌ '+a.username+' - 错误 '+errs+' 个');
              else if (fixed>0) console.log('  ⚠️  '+a.username+' - 已修复 '+fixed+' 项');
              else if (s.hasAllSkills && s.hasIronSword) console.log('  ✅ '+a.username+' - 完整');
              else console.log('  ⚠️  '+a.username+' - 不完整');
            });
          "
