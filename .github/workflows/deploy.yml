# Cloudflare Pages + Worker 部署工作流
name: Deploy to Cloudflare

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages (with Functions)
        run: wrangler pages deploy pages-frontend --project-name=ider-order-system
        working-directory: 工单系统
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: wrangler deploy --config wrangler.worker.toml
        working-directory: 工单系统
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 冒烟测试 - 等待部署生效
        run: sleep 30

      - name: 冒烟测试 - 验证网站可访问
        run: |
          echo "🔍 验证网站首页..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ider-order-system.pages.dev/)
          echo "首页状态码: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ 网站首页不可访问"
            exit 1
          fi
          echo "✅ 网站首页正常"

      - name: 冒烟测试 - 验证关键 API
        run: |
          echo "🔍 验证 API 端点..."
          
          # 测试登录 API（无凭据应返回 401/403）
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ider-order-system.pages.dev/api/auth/login)
          echo "登录 API 状态码: $STATUS"
          if [ "$STATUS" = "500" ]; then
            echo "❌ 登录 API 返回 500 错误"
            exit 1
          fi
          
          # 测试用户 API（无凭据应返回 401/403）
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ider-order-system.pages.dev/api/users/me)
          echo "用户 API 状态码: $STATUS"
          if [ "$STATUS" = "500" ]; then
            echo "❌ 用户 API 返回 500 错误"
            exit 1
          fi
          
          # 测试管理 API（无凭据应返回 403）
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ider-order-system.pages.dev/api/admin/stats)
          echo "管理 API 状态码: $STATUS"
          if [ "$STATUS" = "500" ]; then
            echo "❌ 管理 API 返回 500 错误"
            exit 1
          fi
          
          echo "✅ 所有 API 端点正常（无500错误）"

      - name: 冒烟测试 - 验证静态资源
        run: |
          echo "🔍 验证静态资源..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ider-order-system.pages.dev/js/app.js)
          echo "app.js 状态码: $STATUS"
          if [ "$STATUS" = "500" ]; then
            echo "❌ 静态资源不可访问"
            exit 1
          fi
          echo "✅ 静态资源正常"

      - name: 冒烟测试结果
        if: always()
        run: |
          echo "═══════════════════════════════════════"
          echo "  🚀 部署冒烟测试完成"
          echo "  网站: https://ider-order-system.pages.dev/"
          echo "═══════════════════════════════════════"
