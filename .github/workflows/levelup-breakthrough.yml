name: ⬆️ 升级突破 - Level Up & Breakthrough

on:
  workflow_dispatch:
    inputs:
      accounts_data:
        description: '账号数据（格式: username,password，每行一个）'
        required: true
        type: string
      max_accounts:
        description: '处理的账号数量（默认全部）'
        required: false
        default: ''
        type: string
  schedule:
    - cron: '0 */6 * * *'  # 每6小时运行一次（升级频率更高）
  push:
    branches: [ main ]
    paths:
      - '批量注册工具/levelup_breakthrough.js'
      - '批量注册工具/_anti_detect_shared.js'

jobs:
  levelup:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: '批量注册工具/package-lock.json'

    - name: 安装依赖
      run: |
        cd 批量注册工具
        npm install

    - name: 准备账号文件（有手动输入则优先覆盖）
      run: |
        cd 批量注册工具
        # 如果有手动触发输入的账号数据或 secrets，则覆盖文件
        if [ -n "${{ github.event.inputs.accounts_data }}" ]; then
          echo "${{ github.event.inputs.accounts_data }}" > alchemy_accounts.txt
          echo "✅ 使用手动输入的账号数据"
        elif [ -n "${{ secrets.ACCOUNTS_DATA }}" ]; then
          echo "${{ secrets.ACCOUNTS_DATA }}" > alchemy_accounts.txt
          echo "✅ 使用 Secrets 中的账号数据"
        else
          echo "✅ 使用仓库中的 alchemy_accounts.txt（schedule/push 触发）"
        fi
        echo "📋 账号文件内容:"
        cat alchemy_accounts.txt || echo "(文件为空)"
        echo ""
        echo "📊 账号数量: $(wc -l < alchemy_accounts.txt)"

    - name: 运行升级突破
      run: |
        cd 批量注册工具
        export CI=true
        export MAX_ACCOUNTS="${{ github.event.inputs.max_accounts || '' }}"
        echo "⬆️ 运行升级突破脚本..."
        node levelup_breakthrough.js

    - name: 上传结果
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: levelup-result
        path: 批量注册工具/levelup_result_*.json
        retention-days: 7

    - name: 输出结果摘要
      if: always()
      run: |
        cd 批量注册工具
        echo "📊 执行结果:"
        ls -la levelup_result_*.json 2>/dev/null || echo "无结果文件"
        echo ""
        echo "📋 最新结果预览:"
        cat levelup_result_*.json 2>/dev/null | head -100 || echo "无结果内容"
